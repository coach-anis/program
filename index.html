<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منشئ البرامج | Coach Anis</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #C9A84C;
  --gold2: #E8C97A;
  --dark: #080808;
  --dark2: #0F0F0F;
  --dark3: #161616;
  --dark4: #1E1E1E;
  --text: #EFEFEF;
  --dim: #666;
  --dim2: #333;
  --border: rgba(201,168,76,0.18);
  --green: #2DC653;
  --red: #E63946;
  --blue: #7AB8E8;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }

body {
  background: var(--dark);
  color: var(--text);
  font-family: 'Cairo', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

body::after {
  content:''; position:fixed; inset:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.025'/%3E%3C/svg%3E");
  pointer-events:none; z-index:999;
}

.bg-glow {
  position:fixed; inset:0;
  background: radial-gradient(ellipse 80% 40% at 50% -5%, rgba(201,168,76,0.07) 0%, transparent 60%);
  pointer-events:none; z-index:0;
}

/* ─── HEADER ─── */
.header {
  text-align:center; padding:40px 24px 24px;
  position:relative; z-index:1;
}

.header-tag {
  font-family:'Bebas Neue', sans-serif;
  letter-spacing:5px; font-size:11px;
  color:var(--gold); opacity:.7; margin-bottom:10px;
}

.header h1 {
  font-family:'Bebas Neue', sans-serif;
  font-size:clamp(30px,7vw,56px);
  letter-spacing:2px; line-height:.95; margin-bottom:8px;
}

.header h1 span { color:var(--gold); }
.header p { font-size:12px; color:var(--dim); max-width:360px; margin:0 auto; line-height:1.7; }

/* ─── LAYOUT ─── */
.wrap {
  max-width:1100px; margin:0 auto;
  padding:0 16px 80px;
  position:relative; z-index:1;
  display:grid;
  grid-template-columns:340px 1fr;
  gap:16px;
  align-items:start;
}

@media(max-width:780px) {
  .wrap { grid-template-columns:1fr; }
}

/* ─── PANEL ─── */
.panel {
  background:var(--dark2);
  border:1px solid var(--border);
  border-radius:14px;
  overflow:hidden;
  position:sticky; top:16px;
}

.panel-head {
  padding:16px 18px;
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
}

.panel-title {
  font-family:'Bebas Neue', sans-serif;
  font-size:13px; letter-spacing:3px;
  color:var(--gold); opacity:.7;
}

/* PROGRAM INFO */
.prog-info { padding:18px; }

.field { margin-bottom:14px; }

.field label {
  display:flex; justify-content:space-between;
  font-size:11px; font-weight:700;
  color:var(--dim); margin-bottom:6px;
  letter-spacing:1px;
}

.field label .en {
  font-family:'Bebas Neue', sans-serif;
  font-size:10px; letter-spacing:2px;
  color:var(--gold); opacity:.5;
}

.field input, .field select, .field textarea {
  width:100%;
  background:var(--dark3);
  border:1px solid rgba(255,255,255,.07);
  border-radius:8px;
  padding:10px 12px;
  color:var(--text);
  font-family:'Cairo', sans-serif;
  font-size:13px;
  -webkit-appearance:none;
  transition:border-color .2s;
}

.field textarea { resize:none; min-height:60px; line-height:1.6; font-size:12px; }

.field input:focus, .field select:focus, .field textarea:focus {
  outline:none; border-color:rgba(201,168,76,.4);
}

/* MUSCLE GROUPS */
.muscle-grid {
  display:flex; flex-wrap:wrap; gap:6px;
}

.muscle-tag {
  padding:5px 10px;
  background:var(--dark3);
  border:1px solid rgba(255,255,255,.06);
  border-radius:16px;
  font-size:11px; color:var(--dim);
  cursor:pointer; transition:all .2s;
  user-select:none;
}

.muscle-tag.on {
  border-color:var(--gold);
  color:var(--gold);
  background:rgba(201,168,76,.07);
}

/* DAYS SELECTOR */
.days-row {
  display:flex; gap:6px; flex-wrap:wrap;
}

.day-chip {
  padding:6px 12px;
  background:var(--dark3);
  border:1px solid rgba(255,255,255,.06);
  border-radius:20px;
  font-size:11px; font-weight:700; color:var(--dim);
  cursor:pointer; transition:all .2s;
  user-select:none;
}

.day-chip.on {
  border-color:var(--gold);
  color:var(--gold);
  background:rgba(201,168,76,.08);
}

/* ─── MAIN EDITOR ─── */
.editor { display:flex; flex-direction:column; gap:14px; }

/* DAY CARD */
.day-card {
  background:var(--dark2);
  border:1px solid var(--border);
  border-radius:14px;
  overflow:hidden;
  animation:slideIn .3s ease;
}

@keyframes slideIn {
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;transform:translateY(0);}
}

.day-head {
  padding:14px 18px;
  background:var(--dark3);
  border-bottom:1px solid rgba(255,255,255,.04);
  display:flex; align-items:center; gap:10px;
}

.day-num {
  width:34px; height:34px;
  border-radius:8px;
  background:rgba(201,168,76,.1);
  border:1px solid rgba(201,168,76,.3);
  display:flex; align-items:center; justify-content:center;
  font-family:'Bebas Neue', sans-serif;
  font-size:16px; color:var(--gold);
  flex-shrink:0;
}

.day-name-input {
  flex:1;
  background:transparent;
  border:none; border-bottom:1px solid rgba(255,255,255,.07);
  color:var(--text);
  font-family:'Cairo', sans-serif;
  font-size:14px; font-weight:700;
  padding:4px 0;
  transition:border-color .2s;
}

.day-name-input:focus { outline:none; border-color:var(--gold); }
.day-name-input::placeholder { color:var(--dim); }

.day-actions { display:flex; gap:6px; margin-right:auto; }

.icon-btn {
  width:30px; height:30px;
  border-radius:6px;
  background:transparent;
  border:1px solid rgba(255,255,255,.07);
  color:var(--dim); font-size:13px;
  cursor:pointer; display:flex;
  align-items:center; justify-content:center;
  transition:all .2s;
}

.icon-btn:hover { border-color:var(--gold); color:var(--gold); }
.icon-btn.danger:hover { border-color:var(--red); color:var(--red); }

/* DAY TYPE */
.day-type-row {
  display:flex; gap:6px; padding:12px 18px 0;
  flex-wrap:wrap;
}

.type-btn {
  padding:5px 12px;
  border-radius:16px;
  font-size:11px; font-weight:700;
  border:1px solid rgba(255,255,255,.06);
  background:var(--dark3);
  color:var(--dim); cursor:pointer;
  transition:all .2s;
}

.type-btn.on { border-color:var(--blue); color:var(--blue); background:rgba(122,184,232,.08); }

/* EXERCISES */
.exercises-wrap { padding:14px 18px 18px; }

.exercises-list { display:flex; flex-direction:column; gap:10px; margin-bottom:12px; }

/* EXERCISE ROW */
.ex-row {
  background:var(--dark3);
  border:1px solid rgba(255,255,255,.05);
  border-radius:10px;
  overflow:hidden;
  transition:border-color .2s;
}

.ex-row:hover { border-color:rgba(201,168,76,.2); }

.ex-head {
  display:flex; align-items:center; gap:8px;
  padding:10px 12px;
  border-bottom:1px solid rgba(255,255,255,.04);
}

.ex-drag {
  color:var(--dim2); font-size:14px;
  cursor:grab; flex-shrink:0;
}

.ex-num {
  font-family:'Bebas Neue', sans-serif;
  font-size:11px; color:var(--gold);
  opacity:.6; flex-shrink:0; width:18px;
}

.ex-name {
  flex:1;
  background:transparent; border:none;
  color:var(--text);
  font-family:'Cairo', sans-serif;
  font-size:13px; font-weight:700;
  padding:0;
}

.ex-name:focus { outline:none; }
.ex-name::placeholder { color:var(--dim); font-weight:400; }

.ex-muscle {
  font-size:10px; letter-spacing:1px;
  color:var(--gold); opacity:.5;
  font-family:'Bebas Neue', sans-serif;
  background:var(--dark4);
  border:none; border-radius:10px;
  padding:2px 8px;
  cursor:pointer;
  max-width:80px;
}

.ex-muscle:focus { outline:none; }

.ex-sets-row {
  display:grid;
  grid-template-columns:1fr 1fr 1fr auto;
  gap:6px;
  padding:10px 12px;
  align-items:center;
}

.ex-input-wrap { display:flex; flex-direction:column; gap:3px; }

.ex-input-lbl {
  font-size:9px; color:var(--dim);
  letter-spacing:1px; text-align:center;
}

.ex-input {
  background:var(--dark4);
  border:1px solid rgba(255,255,255,.05);
  border-radius:6px;
  padding:7px 6px;
  color:var(--text);
  font-family:'Cairo', sans-serif;
  font-size:13px; font-weight:700;
  text-align:center;
  transition:border-color .2s;
  width:100%;
}

.ex-input:focus { outline:none; border-color:var(--gold); }
.ex-input::placeholder { color:var(--dim2); font-size:11px; }

.ex-notes {
  width:100%;
  background:transparent;
  border:none; border-top:1px solid rgba(255,255,255,.04);
  padding:8px 12px;
  color:var(--dim);
  font-family:'Cairo', sans-serif;
  font-size:11px;
  resize:none;
}

.ex-notes:focus { outline:none; color:var(--text); }
.ex-notes::placeholder { color:var(--dim2); }

/* ADD EXERCISE BTN */
.btn-add-ex {
  width:100%;
  background:transparent;
  border:1px dashed rgba(201,168,76,.25);
  border-radius:8px;
  padding:10px;
  color:var(--gold); opacity:.6;
  font-family:'Cairo', sans-serif;
  font-size:12px; font-weight:700;
  cursor:pointer; transition:all .2s;
  display:flex; align-items:center; justify-content:center; gap:6px;
}

.btn-add-ex:hover { opacity:1; background:rgba(201,168,76,.05); border-style:solid; }

/* ADD DAY BTN */
.btn-add-day {
  background:var(--dark2);
  border:1px dashed rgba(201,168,76,.2);
  border-radius:14px;
  padding:20px;
  color:var(--gold); opacity:.5;
  font-family:'Cairo', sans-serif;
  font-size:14px; font-weight:700;
  cursor:pointer; transition:all .2s;
  display:flex; align-items:center; justify-content:center; gap:8px;
  font-size:20px;
}

.btn-add-day:hover { opacity:1; background:rgba(201,168,76,.04); border-style:solid; }

/* ─── ACTIONS ─── */
.actions-bar {
  display:flex; gap:10px; margin-top:4px;
}

.btn-primary {
  flex:1;
  background:linear-gradient(135deg, var(--gold), var(--gold2));
  color:var(--dark); border:none;
  border-radius:10px; padding:13px;
  font-family:'Cairo', sans-serif;
  font-size:14px; font-weight:900;
  cursor:pointer; transition:all .25s;
}

.btn-primary:hover { box-shadow:0 8px 24px rgba(201,168,76,.4); transform:translateY(-2px); }

.btn-secondary {
  padding:13px 16px;
  background:transparent;
  border:1px solid var(--border);
  border-radius:10px;
  color:var(--dim); font-size:13px;
  cursor:pointer; transition:all .2s;
  font-family:'Cairo', sans-serif; font-weight:700;
}

.btn-secondary:hover { border-color:var(--gold); color:var(--gold); }

/* ─── PREVIEW MODAL ─── */
.overlay {
  position:fixed; inset:0;
  background:rgba(0,0,0,.9);
  z-index:100; display:none;
  align-items:flex-start; justify-content:center;
  padding:20px; overflow-y:auto;
  backdrop-filter:blur(6px);
}

.overlay.open { display:flex; }

.preview-modal {
  background:var(--dark2);
  border:1px solid var(--border);
  border-radius:18px;
  max-width:700px; width:100%;
  margin:auto; position:relative;
  animation:modalIn .3s ease;
}

@keyframes modalIn {
  from{opacity:0;transform:scale(.96);}
  to{opacity:1;transform:scale(1);}
}

.modal-close-btn {
  position:absolute; top:14px; left:14px;
  width:32px; height:32px; border-radius:50%;
  background:var(--dark3); border:1px solid var(--border);
  color:var(--dim); cursor:pointer; font-size:14px;
  display:flex; align-items:center; justify-content:center;
  transition:all .2s; z-index:1;
}

.modal-close-btn:hover { border-color:var(--gold); color:var(--text); }

.preview-head {
  padding:28px 24px 20px;
  border-bottom:1px solid var(--border);
  text-align:center; position:relative;
}

.preview-head::before {
  content:'';
  position:absolute; top:0; left:0; right:0; height:2px;
  background:linear-gradient(90deg, transparent, var(--gold), transparent);
}

.preview-prog-name {
  font-family:'Bebas Neue', sans-serif;
  font-size:28px; letter-spacing:2px;
  margin-bottom:4px;
}

.preview-prog-name span { color:var(--gold); }

.preview-meta {
  font-size:12px; color:var(--dim);
  display:flex; justify-content:center; gap:16px;
  flex-wrap:wrap; margin-top:8px;
}

.preview-meta span { display:flex; align-items:center; gap:4px; }

.preview-body { padding:20px 24px 28px; }

.preview-day {
  margin-bottom:20px;
  border:1px solid rgba(255,255,255,.05);
  border-radius:12px; overflow:hidden;
}

.preview-day-head {
  background:var(--dark3);
  padding:12px 16px;
  display:flex; align-items:center; gap:10px;
}

.preview-day-num {
  width:28px; height:28px; border-radius:6px;
  background:rgba(201,168,76,.12);
  border:1px solid rgba(201,168,76,.3);
  display:flex; align-items:center; justify-content:center;
  font-family:'Bebas Neue', sans-serif;
  font-size:14px; color:var(--gold); flex-shrink:0;
}

.preview-day-name { font-size:14px; font-weight:900; }
.preview-day-type { font-size:10px; letter-spacing:2px; color:var(--blue); font-family:'Bebas Neue', sans-serif; margin-right:auto; }

.preview-ex-table {
  width:100%; border-collapse:collapse;
}

.preview-ex-table th {
  padding:8px 12px;
  font-size:9px; letter-spacing:2px;
  color:var(--dim); font-family:'Bebas Neue', sans-serif;
  text-align:right; border-bottom:1px solid rgba(255,255,255,.04);
  background:rgba(0,0,0,.2);
}

.preview-ex-table td {
  padding:10px 12px;
  font-size:13px;
  border-bottom:1px solid rgba(255,255,255,.03);
}

.preview-ex-table tr:last-child td { border-bottom:none; }

.preview-ex-table td:first-child { color:var(--dim); font-size:11px; }
.preview-ex-table td:nth-child(2) { font-weight:700; }
.preview-ex-table .sets-val { font-family:'Bebas Neue', sans-serif; font-size:16px; color:var(--gold); }
.preview-ex-table .reps-val { font-family:'Bebas Neue', sans-serif; font-size:16px; color:#E8C97A; }
.preview-ex-table .rest-val { font-family:'Bebas Neue', sans-serif; font-size:14px; color:#7AB8E8; }
.preview-ex-table .rpe-val  { font-family:'Bebas Neue', sans-serif; font-size:14px; color:#C97AE8; }

.preview-notes-text {
  font-size:11px; color:var(--dim);
  padding:8px 12px;
  border-top:1px solid rgba(255,255,255,.04);
  font-style:italic;
  background:rgba(0,0,0,.15);
}

.print-btn {
  width:100%; margin-top:16px;
  background:linear-gradient(135deg, var(--gold), var(--gold2));
  color:var(--dark); border:none; border-radius:10px;
  padding:13px;
  font-family:'Cairo', sans-serif; font-size:14px; font-weight:900;
  cursor:pointer; transition:all .25s;
}

.print-btn:hover { box-shadow:0 6px 20px rgba(201,168,76,.4); transform:translateY(-2px); }

/* stats strip */
.stats-strip {
  display:flex; gap:0;
  background:var(--dark3);
  border:1px solid var(--border);
  border-radius:10px; overflow:hidden;
  margin-bottom:14px;
}

.stat-s {
  flex:1; text-align:center;
  padding:12px 6px;
  border-left:1px solid rgba(255,255,255,.04);
}

.stat-s:last-child { border-left:none; }
.stat-sv { font-family:'Bebas Neue', sans-serif; font-size:22px; color:var(--gold); }
.stat-sl { font-size:9px; color:var(--dim); letter-spacing:1px; margin-top:2px; }

/* exercise library hint */
.lib-hint {
  font-size:10px; color:var(--dim);
  padding:6px 0 2px;
  opacity:.6;
}

/* ── GATE OVERLAY ── */
#gate-overlay {
  position: fixed;
  inset: 0;
  background: #0d0d0d;
  z-index: 99999;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
#gate-overlay.hide {
  animation: gateFadeOut 0.6s ease forwards;
  pointer-events: none;
}
@keyframes gateFadeOut {
  to { opacity: 0; transform: scale(1.03); }
}
#gate-overlay::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 40%, rgba(201,168,76,0.07) 0%, transparent 70%),
    radial-gradient(ellipse 40% 40% at 20% 80%, rgba(201,168,76,0.04) 0%, transparent 60%);
  pointer-events: none;
}
.gate-particles { position:absolute;inset:0;pointer-events:none;overflow:hidden; }
.gate-particle {
  position:absolute; width:2px; height:2px;
  background:#C9A84C; border-radius:50%; opacity:0;
  animation: gfloat linear infinite;
}
@keyframes gfloat {
  0%   { opacity:0; transform:translateY(100vh) scale(0); }
  10%  { opacity:0.6; }
  90%  { opacity:0.3; }
  100% { opacity:0; transform:translateY(-10vh) scale(1.5); }
}
.gate-card {
  position:relative; z-index:10;
  background:linear-gradient(160deg,#161616 0%,#111111 100%);
  border:1px solid rgba(201,168,76,0.25);
  border-radius:24px; padding:56px 48px;
  width:100%; max-width:440px; text-align:center;
  box-shadow:0 0 0 1px rgba(201,168,76,0.05),0 32px 80px rgba(0,0,0,.7),0 0 60px rgba(201,168,76,0.06);
  animation:gcardIn .8s cubic-bezier(0.16,1,0.3,1) both;
}
@keyframes gcardIn {
  from{opacity:0;transform:translateY(30px) scale(0.97);}
  to{opacity:1;transform:translateY(0) scale(1);}
}
.gate-card::before {
  content:''; position:absolute; top:0; left:50%; transform:translateX(-50%);
  width:60%; height:1px;
  background:linear-gradient(90deg,transparent,#C9A84C,transparent);
}
.gate-lock {
  width:72px;height:72px;margin:0 auto 28px;
  background:linear-gradient(135deg,#1e1c18,#2a2720);
  border:1px solid rgba(201,168,76,0.3); border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:28px;
  box-shadow:0 0 30px rgba(201,168,76,0.1),inset 0 1px 0 rgba(255,255,255,0.05);
  animation:gpulse 3s ease-in-out infinite;
}
@keyframes gpulse {
  0%,100%{box-shadow:0 0 30px rgba(201,168,76,0.1),inset 0 1px 0 rgba(255,255,255,0.05);}
  50%{box-shadow:0 0 50px rgba(201,168,76,0.2),inset 0 1px 0 rgba(255,255,255,0.05);}
}
.gate-brand {
  font-family:'Bebas Neue',sans-serif;font-size:13px;
  letter-spacing:4px;color:#C9A84C;margin-bottom:10px;opacity:.8;
}
.gate-title { font-size:26px;font-weight:900;color:#fff;line-height:1.3;margin-bottom:8px; }
.gate-sub { font-size:14px;color:#555;margin-bottom:40px;line-height:1.6; }
.gate-input-wrap { position:relative;margin-bottom:16px; }
.gate-input-wrap input {
  width:100%; background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08); border-radius:12px;
  padding:16px 50px 16px 20px;
  font-family:'Cairo',sans-serif; font-size:18px; font-weight:600;
  color:#fff; text-align:center; letter-spacing:6px; outline:none;
  transition:all .3s; caret-color:#C9A84C;
}
.gate-input-wrap input::placeholder { letter-spacing:2px;font-size:14px;font-weight:400;color:#333; }
.gate-input-wrap input:focus {
  border-color:rgba(201,168,76,.5);background:rgba(201,168,76,.04);
  box-shadow:0 0 0 3px rgba(201,168,76,.08);
}
.gate-input-wrap input.gerror {
  border-color:rgba(220,60,60,.5);background:rgba(220,60,60,.04);
  animation:gshake .4s ease;
}
.gate-input-wrap input.gsuccess { border-color:rgba(80,200,120,.5);background:rgba(80,200,120,.04); }
@keyframes gshake {
  0%,100%{transform:translateX(0);}
  20%{transform:translateX(-8px);}
  40%{transform:translateX(8px);}
  60%{transform:translateX(-5px);}
  80%{transform:translateX(5px);}
}
.gate-eye {
  position:absolute;left:16px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;font-size:18px;color:#444;
  transition:color .2s;padding:4px;
}
.gate-eye:hover{color:#C9A84C;}
.gate-err { color:#e05555;font-size:13px;margin-bottom:16px;min-height:20px;
  transition:opacity .3s;display:flex;align-items:center;justify-content:center;gap:6px; }
.gate-btn {
  width:100%;background:linear-gradient(135deg,#C9A84C,#E8C97A,#C9A84C);
  background-size:200% 200%; color:#000; border:none; border-radius:12px;
  padding:16px 32px; font-family:'Cairo',sans-serif;
  font-size:16px;font-weight:900;cursor:pointer;transition:all .3s;
  position:relative;overflow:hidden;letter-spacing:1px;
}
.gate-btn:hover { background-position:right center;transform:translateY(-2px);box-shadow:0 8px 30px rgba(201,168,76,.4); }
.gate-btn:active{transform:translateY(0);}
.gate-btn::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.2),transparent);border-radius:inherit;}
.gate-btn.gloading{pointer-events:none;opacity:.7;}
.gate-success-wrap {
  position:absolute;inset:0;background:#0d0d0d;z-index:5;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
  opacity:0;pointer-events:none;transition:opacity .4s;
}
.gate-success-wrap.show{opacity:1;pointer-events:all;}
.gate-check {
  width:80px;height:80px;background:linear-gradient(135deg,#C9A84C,#E8C97A);
  border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:36px;
  animation:gpopIn .5s cubic-bezier(.16,1,.3,1) both;
}
@keyframes gpopIn{from{transform:scale(0);opacity:0;}to{transform:scale(1);opacity:1;}}
.gate-success-wrap p{color:#C9A84C;font-size:18px;font-weight:700;animation:gfadeUp .5s .2s both;}
@keyframes gfadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.gate-prog{width:200px;height:3px;background:rgba(201,168,76,.2);border-radius:10px;overflow:hidden;animation:gfadeUp .5s .3s both;}
.gate-prog-fill{height:100%;background:linear-gradient(90deg,#C9A84C,#E8C97A);border-radius:inherit;width:0%;transition:width 1.5s ease;}
@media(max-width:480px){.gate-card{padding:40px 24px;margin:16px;}.gate-title{font-size:22px;}}
</style>
</head>
<body>

<!-- ── CODE GATE ── -->
<div id="gate-overlay">
  <div class="gate-particles" id="gateParticles"></div>
  <div class="gate-card">
    <div class="gate-lock">🔐</div>
    <div class="gate-brand">COACH ANIS</div>
    <h2 class="gate-title">برنامج التدريب</h2>
    <p class="gate-sub">أدخل كود الدخول للوصول إلى البرنامج</p>
    <div class="gate-input-wrap">
      <input type="password" id="gateInput" placeholder="• • • • • • • •" maxlength="20" autocomplete="off" spellcheck="false"/>
      <button class="gate-eye" id="gateEye" title="إظهار/إخفاء">👁</button>
    </div>
    <div class="gate-err" id="gateErr"></div>
    <button class="gate-btn" id="gateBtn" onclick="gateCheck()">دخول ←</button>
    <div class="gate-success-wrap" id="gateSuccess">
      <div class="gate-check">✓</div>
      <p>مرحباً بك! جارٍ الدخول...</p>
      <div class="gate-prog"><div class="gate-prog-fill" id="gateProgFill"></div></div>
    </div>
  </div>
</div>

<div class="bg-glow"></div>

<div class="header">
  <div class="header-tag">PROGRAM BUILDER · منشئ البرامج</div>
  <h1>برمج برنامجك<br><span>التدريبي</span></h1>
  <p>صمّم برنامج تدريبي كامل بالأيام والتمارين والجولات والتكرارات</p>
</div>

<div class="wrap">

  <!-- ─── SIDEBAR PANEL ─── -->
  <div>
    <div class="panel">
      <div class="panel-head">
        <div class="panel-title">⚙ إعدادات البرنامج</div>
      </div>
      <div class="prog-info">

        <div class="field">
          <label>اسم البرنامج <span class="en">PROGRAM NAME</span></label>
          <input type="text" id="progName" placeholder="مثال: برنامج تضخيم 4 أيام">
        </div>

        <div class="field">
          <label>اسم العميل <span class="en">CLIENT NAME</span></label>
          <input type="text" id="clientName" placeholder="الاسم الكامل">
        </div>

        <div class="field">
          <label>الهدف <span class="en">GOAL</span></label>
          <select id="progGoal">
            <option>تضخيم · Muscle Gain</option>
            <option>تنشيف · Fat Loss</option>
            <option>قوة · Strength</option>
            <option>ثبات · Recomp</option>
            <option>لياقة عامة · General Fitness</option>
          </select>
        </div>

        <div class="field">
          <label>المستوى <span class="en">LEVEL</span></label>
          <select id="progLevel">
            <option>مبتدئ · Beginner</option>
            <option selected>متوسط · Intermediate</option>
            <option>متقدم · Advanced</option>
          </select>
        </div>

        <div class="field">
          <label>المدة <span class="en">DURATION</span></label>
          <select id="progDuration">
            <option>4 أسابيع</option>
            <option selected>8 أسابيع</option>
            <option>12 أسبوع</option>
            <option>16 أسبوع</option>
          </select>
        </div>

        <div class="field">
          <label>ملاحظات عامة <span class="en">NOTES</span></label>
          <textarea id="progNotes" placeholder="تعليمات عامة للعميل..."></textarea>
        </div>

        <!-- STATS -->
        <div class="stats-strip" id="statsStrip">
          <div class="stat-s"><div class="stat-sv" id="statDays">0</div><div class="stat-sl">DAYS</div></div>
          <div class="stat-s"><div class="stat-sv" id="statEx">0</div><div class="stat-sl">تمارين</div></div>
          <div class="stat-s"><div class="stat-sv" id="statSets">0</div><div class="stat-sl">SETS</div></div>
        </div>

        <div class="actions-bar">
          <button class="btn-primary" onclick="openPreview()">👁 معاينة وطباعة</button>
          <button class="btn-secondary" onclick="clearAll()">🗑</button>
        </div>

      </div>
    </div>
  </div>

  <!-- ─── EDITOR ─── -->
  <div>
    <div class="editor" id="editor"></div>
    <button class="btn-add-day" onclick="addDay()">
      ＋ إضافة يوم تدريب
    </button>
  </div>

</div>

<!-- ─── PREVIEW MODAL ─── -->
<div class="overlay" id="overlay" onclick="closePreview(event)">
  <div class="preview-modal" id="previewModal">
    <button class="modal-close-btn" onclick="closePreview()">✕</button>
    <div class="preview-head">
      <div class="preview-prog-name" id="pvName">اسم البرنامج</div>
      <div style="font-size:12px;color:var(--dim)" id="pvClient"></div>
      <div class="preview-meta" id="pvMeta"></div>
    </div>
    <div class="preview-body" id="pvBody"></div>
    <div style="padding:0 24px 24px">
      <button class="print-btn" onclick="window.print()">🖨 طباعة / حفظ PDF</button>
    </div>
  </div>
</div>

<script>
let days = [];
let dayCounter = 0;

const muscleOptions = ['صدر','ظهر','كتف','بايسبس','ترايسبس','رجل أمام','رجل خلف','بطن','ساق','كامل الجسم'];
const dayTypes = ['تضخيم','تنشيف','قوة','تحمل','راحة نشطة'];
const exLibrary = {
  'صدر':['بنش برس','دمبل برس','فلايز','بنش ضيق','كابل كروس','بوش آب'],
  'ظهر':['ديدليفت','تيبار رو','لات بول داون','سيتد رو','بول آب','فيس بول'],
  'كتف':['أوفر هيد برس','لاترال رايز','فرونت رايز','فيس بول','أرنولد برس'],
  'بايسبس':['بايسبس كيرل','هامر كيرل','انكلاين كيرل','كابل كيرل','كونسنتريشن'],
  'ترايسبس':['ترايسبس بوش داون','سكال كراشر','ديبس','أوفر هيد إكستنشن','كيك باك'],
  'رجل أمام':['سكوات','ليج برس','ليج إكستنشن','هاك سكوات','لنج'],
  'رجل خلف':['رومانيان ديدليفت','ليج كيرل','سينجل ليج ديدليفت','هيب ثراست'],
  'بطن':['كرانش','لي رايز','بلانك','كابل كرانش','ريفيرس كرانش'],
  'ساق':['كالف رايز','سيتد كالف رايز','دونكي كالف'],
};

function addDay() {
  dayCounter++;
  const id = 'day_' + Date.now();
  days.push({ id, num: dayCounter, name:'', type:'تضخيم', exercises:[] });
  renderDay(id);
  updateStats();
  setTimeout(() => {
    const el = document.getElementById('card_'+id);
    if(el) el.scrollIntoView({ behavior:'smooth', block:'start' });
  }, 100);
}

function renderDay(id) {
  const day = days.find(d => d.id === id);
  const editor = document.getElementById('editor');

  // Remove existing card if re-render
  const existing = document.getElementById('card_'+id);
  if(existing) existing.remove();

  const card = document.createElement('div');
  card.className = 'day-card';
  card.id = 'card_'+id;

  const typeBtns = dayTypes.map(t =>
    `<button class="type-btn ${day.type===t?'on':''}" onclick="setDayType('${id}','${t}',this)">${t}</button>`
  ).join('');

  card.innerHTML = `
    <div class="day-head">
      <div class="day-num">D${day.num}</div>
      <input class="day-name-input" placeholder="اسم اليوم (مثال: صدر وترايسبس)" value="${day.name}"
        oninput="setDayName('${id}',this.value)">
      <div class="day-actions">
        <button class="icon-btn" onclick="duplicateDay('${id}')" title="نسخ">⧉</button>
        <button class="icon-btn danger" onclick="removeDay('${id}')" title="حذف">✕</button>
      </div>
    </div>
    <div class="exercises-wrap">
      <div class="lib-hint">💡 اكتب اسم التمرين أو اختر من مكتبة التمارين</div>
      <div class="exercises-list" id="exlist_${id}"></div>
      <button class="btn-add-ex" onclick="addExercise('${id}')">＋ إضافة تمرين</button>
    </div>
  `;

  editor.appendChild(card);

  // Re-render existing exercises
  day.exercises.forEach(ex => renderExercise(id, ex.id));
}

function setDayName(id, val) {
  const d = days.find(d => d.id === id);
  if(d) d.name = val;
}

function setDayType(id, type, btn) {
  const d = days.find(d => d.id === id);
  if(d) d.type = type;
  btn.closest('.day-type-row').querySelectorAll('.type-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
}

function removeDay(id) {
  days = days.filter(d => d.id !== id);
  document.getElementById('card_'+id)?.remove();
  updateStats();
}

function duplicateDay(id) {
  const orig = days.find(d => d.id === id);
  if(!orig) return;
  dayCounter++;
  const newId = 'day_' + Date.now();
  const newDay = {
    id: newId,
    num: dayCounter,
    name: orig.name + ' (نسخة)',
    type: orig.type,
    exercises: orig.exercises.map(ex => ({
      ...ex, id: 'ex_'+Date.now()+Math.random()
    }))
  };
  days.push(newDay);
  renderDay(newId);
  updateStats();
}

function addExercise(dayId) {
  const exId = 'ex_' + Date.now();
  const day = days.find(d => d.id === dayId);
  if(!day) return;
  day.exercises.push({ id:exId, name:'', muscle:'', sets:'3', reps:'10', rest:'90ث', rpe:'', notes:'' });
  renderExercise(dayId, exId);
  updateStats();
}

function renderExercise(dayId, exId) {
  const day = days.find(d => d.id === dayId);
  if(!day) return;
  const ex = day.exercises.find(e => e.id === exId);
  if(!ex) return;
  const list = document.getElementById('exlist_'+dayId);
  if(!list) return;

  const existing = document.getElementById('ex_'+exId);
  if(existing) { existing.remove(); }

  const exNum = day.exercises.indexOf(ex) + 1;

  const row = document.createElement('div');
  row.className = 'ex-row';
  row.id = 'ex_'+exId;

  // build muscle datalist
  const dlId = 'dl_'+exId;
  const muscleOpts = muscleOptions.map(m => `<option value="${m}">`).join('');

  row.innerHTML = `
    <datalist id="${dlId}">${muscleOpts}</datalist>
    <div class="ex-head">
      <span class="ex-drag">⠿</span>
      <span class="ex-num">${exNum}</span>
      <input class="ex-name" placeholder="اسم التمرين..." value="${ex.name}"
        oninput="updateEx('${dayId}','${exId}','name',this.value)"
        list="exnames_${exId}">
      <datalist id="exnames_${exId}">
        ${Object.values(exLibrary).flat().map(n=>`<option value="${n}">`).join('')}
      </datalist>
      <input class="ex-muscle" list="${dlId}" placeholder="عضلة" value="${ex.muscle}"
        oninput="updateEx('${dayId}','${exId}','muscle',this.value)">
      <button class="icon-btn danger" onclick="removeExercise('${dayId}','${exId}')">✕</button>
    </div>
    <div class="ex-sets-row">
      <div class="ex-input-wrap">
        <div class="ex-input-lbl">SETS · جولات</div>
        <input class="ex-input" type="text" placeholder="3" value="${ex.sets}"
          oninput="updateEx('${dayId}','${exId}','sets',this.value)">
      </div>
      <div class="ex-input-wrap">
        <div class="ex-input-lbl">REPS · تكرارات</div>
        <input class="ex-input" type="text" placeholder="8-12" value="${ex.reps}"
          oninput="updateEx('${dayId}','${exId}','reps',this.value)">
      </div>
      <div class="ex-input-wrap">
        <div class="ex-input-lbl">REST · راحة</div>
        <input class="ex-input" type="text" placeholder="90ث" value="${ex.rest}"
          oninput="updateEx('${dayId}','${exId}','rest',this.value)">
      </div>
      <div></div>
    </div>
    <textarea class="ex-notes" rows="1" placeholder="ملاحظات: مثال: ركز على الفاصل، تحكم في النزول..."
      oninput="updateEx('${dayId}','${exId}','notes',this.value)">${ex.notes}</textarea>
  `;

  list.appendChild(row);
}

function updateEx(dayId, exId, field, val) {
  const day = days.find(d => d.id === dayId);
  if(!day) return;
  const ex = day.exercises.find(e => e.id === exId);
  if(ex) { ex[field] = val; }
  if(field === 'sets') updateStats();
}

function removeExercise(dayId, exId) {
  const day = days.find(d => d.id === dayId);
  if(!day) return;
  day.exercises = day.exercises.filter(e => e.id !== exId);
  document.getElementById('ex_'+exId)?.remove();
  // renumber
  const list = document.getElementById('exlist_'+dayId);
  if(list) list.querySelectorAll('.ex-num').forEach((el, i) => el.textContent = i+1);
  updateStats();
}

function updateStats() {
  const totalEx = days.reduce((s,d) => s + d.exercises.length, 0);
  const totalSets = days.reduce((s,d) =>
    s + d.exercises.reduce((ss, ex) => ss + (parseInt(ex.sets)||0), 0), 0);
  document.getElementById('statDays').textContent = days.length;
  document.getElementById('statEx').textContent = totalEx;
  document.getElementById('statSets').textContent = totalSets;
}

function clearAll() {
  if(!confirm('هل تريد مسح كل شيء؟')) return;
  days = []; dayCounter = 0;
  document.getElementById('editor').innerHTML = '';
  updateStats();
}

// ─── PREVIEW ───
function openPreview() {
  const name = document.getElementById('progName').value || 'البرنامج التدريبي';
  const client = document.getElementById('clientName').value;
  const goal = document.getElementById('progGoal').value;
  const level = document.getElementById('progLevel').value;
  const duration = document.getElementById('progDuration').value;
  const notes = document.getElementById('progNotes').value;

  document.getElementById('pvName').innerHTML = name.split(' ').map((w,i) => i===0?`${w} `:`<span>${w}</span>`).join(' ');
  document.getElementById('pvClient').textContent = client ? `العميل: ${client}` : '';
  document.getElementById('pvMeta').innerHTML = `
    <span>🎯 ${goal}</span>
    <span>📊 ${level}</span>
    <span>📅 ${duration}</span>
    <span>🏋️ ${days.length} أيام</span>
  `;

  let html = '';
  if(notes) html += `<div style="background:var(--dark3);border-radius:10px;padding:14px 16px;margin-bottom:16px;font-size:13px;color:var(--dim);border-right:3px solid var(--gold)"><strong style="color:var(--gold)">📋 ملاحظات عامة:</strong> ${notes}</div>`;

  days.forEach(day => {
    if(day.exercises.length === 0) return;
    html += `
    <div class="preview-day">
      <div class="preview-day-head">
        <div class="preview-day-num">D${day.num}</div>
        <div class="preview-day-name">${day.name || 'يوم ' + day.num}</div>
        <div class="preview-day-type">${day.type}</div>
      </div>
      <table class="preview-ex-table">
        <thead>
          <tr>
            <th>#</th>
            <th>التمرين</th>
            <th>العضلة</th>
            <th>Sets</th>
            <th>Reps</th>
            <th>Rest</th>
          </tr>
        </thead>
        <tbody>
          ${day.exercises.map((ex, i) => `
            <tr>
              <td>${i+1}</td>
              <td style="font-weight:700">${ex.name || '—'}</td>
              <td style="font-size:11px;color:var(--gold);opacity:.7">${ex.muscle || '—'}</td>
              <td><span class="sets-val">${ex.sets || '—'}</span></td>
              <td><span class="reps-val">${ex.reps || '—'}</span></td>
              <td><span class="rest-val">${ex.rest || '—'}</span></td>
            </tr>
            ${ex.notes ? `<tr><td colspan="6"><div class="preview-notes-text">💬 ${ex.notes}</div></td></tr>` : ''}
          `).join('')}
        </tbody>
      </table>
    </div>`;
  });

  if(!html) html = '<div style="text-align:center;padding:40px;color:var(--dim)">أضف أياماً وتمارين أولاً</div>';

  html += `<div style="text-align:center;padding:20px 0 4px;font-family:Bebas Neue,sans-serif;letter-spacing:4px;font-size:10px;color:var(--dim);opacity:.4">PROGRAMMED BY COACH ANIS · @coach__anis</div>`;

  document.getElementById('pvBody').innerHTML = html;
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closePreview(e) {
  if(e && e.target !== document.getElementById('overlay') && !e.target.classList.contains('modal-close-btn')) return;
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => {
  if(e.key==='Escape') closePreview({target:document.getElementById('overlay')});
});

// Init with one day
addDay();
</script>

<script>
(function(){
  var pc=document.getElementById('gateParticles');
  for(var i=0;i<25;i++){
    var p=document.createElement('div');p.className='gate-particle';
    p.style.cssText='left:'+Math.random()*100+'%;width:'+(Math.random()*3+1)+'px;height:'+(Math.random()*3+1)+'px;animation-duration:'+(Math.random()*12+8)+'s;animation-delay:'+(Math.random()*10)+'s;';
    pc.appendChild(p);
  }
  document.getElementById('gateEye').onclick=function(){
    var inp=document.getElementById('gateInput');
    var vis=inp.type==='text';
    inp.type=vis?'password':'text';
    this.textContent=vis?'👁':'🙈';
  };
  document.getElementById('gateInput').addEventListener('keydown',function(e){
    if(e.key==='Enter')gateCheck();
    document.getElementById('gateErr').textContent='';
    this.classList.remove('gerror');
  });
})();

function gateCheck(){
  var val=document.getElementById('gateInput').value.trim();
  var err=document.getElementById('gateErr');
  var btn=document.getElementById('gateBtn');
  var inp=document.getElementById('gateInput');
  if(!val){err.innerHTML='⚠️ من فضلك أدخل الكود';inp.classList.add('gerror');setTimeout(function(){inp.classList.remove('gerror');},600);return;}
  btn.classList.add('gloading');btn.textContent='...جارٍ التحقق';
  setTimeout(function(){
    if(val==='anis2006'){
      inp.classList.add('gsuccess');
      var s=document.getElementById('gateSuccess');s.classList.add('show');
      setTimeout(function(){document.getElementById('gateProgFill').style.width='100%';},100);
      setTimeout(function(){
        var ov=document.getElementById('gate-overlay');
        ov.classList.add('hide');
        setTimeout(function(){ov.style.display='none';},700);
      },1700);
    } else {
      btn.classList.remove('gloading');btn.textContent='دخول ←';
      inp.classList.add('gerror');inp.value='';
      err.innerHTML='✗ الكود غير صحيح، حاول مجدداً';
      setTimeout(function(){inp.classList.remove('gerror');err.textContent='';},2500);
      inp.focus();
    }
  },700);
}
</script>

</body>
</html>
