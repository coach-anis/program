<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منشئ البرامج | Coach Anis</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--primary:#1a1a2e;--accent:#e8b84b;--light:#f7f7f5;--border:#e0ddd5;--text:#1a1a2e;--muted:#8a8a9a;--red:#e74c3c;--purple:#5b4db5;}
body{background:var(--light);color:var(--text);font-family:'Cairo',sans-serif;min-height:100vh;}

/* GATE */
#gate{position:fixed;inset:0;z-index:9999;background:var(--primary);display:flex;align-items:center;justify-content:center;transition:opacity .6s,transform .6s;}
#gate.hide{opacity:0;transform:scale(1.04);pointer-events:none;}
.gate-box{background:#fff;border-radius:24px;padding:48px 40px;width:100%;max-width:380px;text-align:center;box-shadow:0 32px 80px rgba(0,0,0,.4);}
.gate-logo{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:6px;color:var(--accent);margin-bottom:6px;}
.gate-icon{font-size:44px;margin:14px 0;}
.gate-title{font-size:20px;font-weight:900;color:var(--primary);margin-bottom:6px;}
.gate-sub{font-size:12px;color:var(--muted);margin-bottom:24px;}
.gate-inp{width:100%;border:2px solid var(--border);border-radius:12px;padding:13px 20px;font-family:'Cairo',sans-serif;font-size:20px;text-align:center;letter-spacing:6px;color:var(--primary);outline:none;transition:border-color .25s;}
.gate-inp:focus{border-color:var(--accent);}
.gate-inp.err{border-color:var(--red);animation:shake .4s;}
.gate-err{color:var(--red);font-size:12px;min-height:18px;margin:7px 0;}
.gate-btn{width:100%;background:var(--primary);color:#fff;border:none;border-radius:12px;padding:14px;font-family:'Cairo',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:background .2s;}
.gate-btn:hover{background:#2d2d4e;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}

/* APP */
#app{display:none;}
#app.show{display:block;}

/* NAV */
nav{background:var(--primary);padding:0 24px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.15);}
.nav-brand{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:4px;color:var(--accent);}
.nav-actions{display:flex;gap:8px;}
.nav-btn{background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:7px 14px;font-family:'Cairo',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:5px;}
.nav-btn:hover{background:rgba(255,255,255,.18);}
.nav-btn.gold{background:var(--accent);color:var(--primary);border-color:var(--accent);}
.nav-btn.gold:hover{background:#f5d07a;}

/* LAYOUT */
.layout{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 58px);}
@media(max-width:720px){.layout{grid-template-columns:1fr;}}

/* SIDEBAR */
.sidebar{background:#fff;border-left:1px solid var(--border);padding:20px 18px;position:sticky;top:58px;height:calc(100vh - 58px);overflow-y:auto;}
.sb-title{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.field{margin-bottom:12px;}
.field label{display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:4px;}
.field input,.field textarea{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:9px 11px;font-family:'Cairo',sans-serif;font-size:13px;color:var(--text);background:#fff;outline:none;transition:border-color .2s;}
.field input:focus,.field textarea:focus{border-color:var(--accent);}
.field textarea{resize:none;min-height:64px;line-height:1.6;}
.logo-zone{width:100%;height:60px;border:2px dashed var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;gap:7px;color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;background:#fafafa;}
.logo-zone:hover{border-color:var(--accent);color:var(--accent);}
.logo-preview{width:100%;max-height:70px;object-fit:contain;border-radius:8px;border:1px solid var(--border);display:block;}
.logo-remove{display:block;text-align:center;color:var(--red);font-size:11px;font-weight:700;cursor:pointer;margin-top:5px;}
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:14px;}
.stat-box{background:var(--light);border-radius:8px;padding:10px 4px;text-align:center;border:1px solid var(--border);}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--accent);line-height:1;}
.stat-lbl{font-size:9px;color:var(--muted);letter-spacing:1px;margin-top:2px;}
.btn-preview{width:100%;background:var(--primary);color:#fff;border:none;border-radius:10px;padding:13px;font-family:'Cairo',sans-serif;font-size:14px;font-weight:900;cursor:pointer;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:7px;transition:background .2s;}
.btn-preview:hover{background:#2d2d4e;}
.btn-row{display:flex;gap:6px;}
.btn-sm{flex:1;background:var(--light);border:1.5px solid var(--border);border-radius:8px;padding:9px 6px;font-family:'Cairo',sans-serif;font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:4px;}
.btn-sm:hover{border-color:var(--accent);color:var(--accent);}

/* EDITOR */
.editor{padding:22px;background:var(--light);}
.editor-title{font-size:15px;font-weight:900;color:var(--primary);margin-bottom:18px;}

/* DAY CARD */
.day-card{background:#fff;border-radius:14px;border:1.5px solid var(--border);margin-bottom:16px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.04);}
.day-head{background:var(--primary);padding:13px 16px;display:flex;align-items:center;gap:10px;}
.day-num{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--accent);min-width:26px;}
.day-name-inp{flex:1;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:6px;padding:7px 11px;color:#fff;font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;outline:none;transition:border-color .2s;}
.day-name-inp:focus{border-color:var(--accent);}
.day-name-inp::placeholder{color:rgba(255,255,255,.4);font-weight:400;}
.day-del{background:rgba(255,255,255,.1);border:none;border-radius:6px;width:30px;height:30px;color:rgba(255,255,255,.5);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.day-del:hover{background:rgba(231,76,60,.4);color:#fff;}

/* MUSCLE SECTIONS */
.muscle-sections{padding:14px 16px 16px;}
.btn-add-muscle{width:100%;border:2px dashed #c4b8f0;border-radius:10px;background:none;padding:11px;color:var(--purple);font-family:'Cairo',sans-serif;font-size:12px;font-weight:700;cursor:pointer;margin-bottom:10px;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:7px;}
.btn-add-muscle:hover{background:#f5f3ff;border-color:var(--purple);}

/* MUSCLE BLOCK */
.muscle-block{border:1.5px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden;}
.muscle-block-head{background:#f0eef8;padding:9px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #ddd9f0;}
.muscle-select{flex:1;border:none;background:transparent;font-family:'Cairo',sans-serif;font-size:14px;font-weight:900;color:var(--purple);outline:none;cursor:pointer;-webkit-appearance:none;}
.muscle-block-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:5px;transition:all .2s;}
.muscle-block-del:hover{background:#fde8e8;color:var(--red);}

/* EX TABLE HEADER */
.ex-thead{display:grid;grid-template-columns:22px 1fr 56px 58px 56px 26px;gap:6px;padding:7px 12px;background:#fafafa;border-bottom:1px solid var(--border);}
.ex-th{font-size:9px;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;text-align:center;}
.ex-th.name{text-align:right;}

/* EX ROW */
.ex-row{display:grid;grid-template-columns:22px 1fr 56px 58px 56px 26px;gap:6px;align-items:center;padding:8px 12px;border-bottom:1px solid #f5f3f0;transition:background .15s;}
.ex-row:hover{background:#fdfcf8;}
.ex-num{font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--accent);text-align:center;}
.ex-inp{width:100%;border:none;background:transparent;font-family:'Cairo',sans-serif;font-size:13px;color:var(--text);outline:none;font-weight:700;}
.ex-inp::placeholder{color:#c0bfba;font-weight:400;}
.ex-mini{width:100%;border:1.5px solid var(--border);border-radius:6px;padding:5px 4px;font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;color:var(--text);text-align:center;background:#fff;outline:none;transition:border-color .2s;}
.ex-mini:focus{border-color:var(--accent);}
.ex-mini::placeholder{color:#c0bfba;font-weight:400;}
.ex-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:5px;transition:all .2s;}
.ex-del:hover{background:#fde8e8;color:var(--red);}

/* EX EXTRAS */
.ex-extras{padding:5px 12px 9px;border-bottom:1px solid #f5f3f0;background:#fdfcf8;}
.ex-notes-inp{width:100%;border:none;background:transparent;border-bottom:1px dashed var(--border);font-family:'Cairo',sans-serif;font-size:11px;color:var(--muted);outline:none;padding:3px 0;margin-bottom:7px;}
.ex-notes-inp:focus{border-bottom-color:var(--accent);color:var(--text);}
.ex-notes-inp::placeholder{color:#ccc;}
.ex-img-btn{width:100%;border:1.5px dashed var(--border);border-radius:7px;background:none;padding:6px;color:var(--muted);font-family:'Cairo',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:5px;}
.ex-img-btn:hover{border-color:var(--accent);color:var(--accent);}
.ex-img-preview{width:100%;max-height:110px;object-fit:contain;border-radius:7px;border:1px solid var(--border);background:#fafafa;}
.ex-img-rem{display:block;text-align:center;color:var(--red);font-size:11px;font-weight:700;cursor:pointer;margin-top:4px;}

/* ADD EX BTN */
.btn-add-ex{width:100%;border:none;background:none;padding:9px 12px;color:var(--muted);font-family:'Cairo',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px;border-top:1px dashed var(--border);}
.btn-add-ex:hover{color:var(--accent);background:#fffdf5;}

/* ADD DAY */
.btn-add-day{width:100%;border:2px dashed var(--border);border-radius:14px;background:none;padding:20px;color:var(--muted);font-family:'Cairo',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .3s;display:flex;align-items:center;justify-content:center;gap:10px;}
.btn-add-day:hover{border-color:var(--accent);color:var(--accent);background:#fffdf5;}

/* PREVIEW MODAL */
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;display:none;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto;backdrop-filter:blur(5px);}
#overlay.open{display:flex;}
.modal{background:#fff;border-radius:18px;max-width:740px;width:100%;margin:auto;position:relative;box-shadow:0 40px 100px rgba(0,0,0,.5);overflow:hidden;}
.modal-close{position:absolute;top:13px;left:13px;width:30px;height:30px;border-radius:50%;background:#f0eeea;border:none;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all .2s;z-index:2;}
.modal-close:hover{background:var(--red);color:#fff;}
.modal-print{position:absolute;top:13px;right:13px;background:var(--primary);color:#fff;border:none;border-radius:8px;padding:7px 16px;font-family:'Cairo',sans-serif;font-size:12px;font-weight:700;cursor:pointer;z-index:2;}
.modal-print:hover{background:#2d2d4e;}

/* PREVIEW STYLES */
.pv-cover{text-align:center;padding:38px 30px 28px;background:linear-gradient(150deg,var(--primary) 0%,#2d2d4e 100%);color:#fff;}
.pv-logo{max-width:110px;max-height:75px;object-fit:contain;margin:0 auto 16px;display:block;}
.pv-brand{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:5px;color:var(--accent);margin-bottom:5px;}
.pv-title{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:3px;margin-bottom:7px;color:#fff;line-height:1.1;}
.pv-client{font-size:13px;color:rgba(255,255,255,.55);margin-bottom:16px;}
.pv-tags{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;}
.pv-tag{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.14);border-radius:100px;padding:5px 14px;font-size:12px;}
.pv-line{width:45px;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);margin:20px auto 0;}
.pv-body{padding:24px;}
.pv-day{margin-bottom:20px;border:1.5px solid var(--border);border-radius:12px;overflow:hidden;}
.pv-day-head{background:var(--primary);padding:11px 16px;display:flex;align-items:center;gap:10px;}
.pv-day-num{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--accent);}
.pv-day-name{font-size:14px;font-weight:900;color:#fff;flex:1;}
.pv-day-type{font-size:10px;letter-spacing:2px;color:rgba(255,255,255,.45);font-family:'Bebas Neue',sans-serif;}
.pv-muscle-title{padding:8px 16px;font-size:12px;font-weight:900;color:var(--purple);background:#f0eef8;border-bottom:1px solid #ddd9f0;letter-spacing:.5px;}
.pv-muscle-title::before{content:'• ';}
.pv-table{width:100%;border-collapse:collapse;}
.pv-table th{padding:8px 12px;font-size:9px;letter-spacing:1.5px;color:var(--muted);font-weight:700;text-transform:uppercase;border-bottom:1px solid var(--border);background:#fafafa;text-align:center;}
.pv-table th.name{text-align:right;}
.pv-table td{padding:10px 12px;font-size:13px;border-bottom:1px solid #f5f3f0;vertical-align:middle;text-align:center;}
.pv-table td.name{text-align:right;font-weight:700;}
.pv-table td.sets{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--accent);}
.pv-table td.reps{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--primary);}
.pv-table td.rest{font-size:11px;color:var(--muted);}
.pv-table tr:last-child td{border-bottom:none;}
.pv-table tbody tr:nth-child(even) td{background:#fdfcfa;}
.pv-img{width:100%;max-width:180px;height:auto;display:block;margin:7px 0 0;border-radius:6px;border:1px solid var(--border);}
.pv-notes{font-size:11px;color:var(--muted);padding:5px 12px 9px;background:#fffdf5;font-style:italic;border-top:1px dashed #ece9df;}
.pv-footer{text-align:center;padding:12px;border-top:1px solid var(--border);font-size:10px;color:var(--muted);letter-spacing:3px;font-family:'Bebas Neue',sans-serif;}

/* ══════════════════════════════
   MOBILE RESPONSIVE
══════════════════════════════ */
@media(max-width:720px){

  /* NAV */
  nav{padding:0 14px;height:52px;}
  .nav-brand{font-size:17px;letter-spacing:3px;}
  .nav-btn{padding:6px 10px;font-size:11px;}
  .nav-actions{gap:5px;}

  /* LAYOUT - sidebar goes on top */
  .layout{display:flex;flex-direction:column;}

  /* SIDEBAR - no longer sticky, full width */
  .sidebar{
    position:static;
    height:auto;
    overflow-y:visible;
    border-left:none;
    border-bottom:1px solid var(--border);
    padding:16px 14px;
  }

  /* STATS */
  .stats-row{gap:8px;}
  .stat-val{font-size:22px;}

  /* EDITOR */
  .editor{padding:14px 12px;}
  .editor-title{font-size:13px;margin-bottom:14px;}

  /* DAY CARD */
  .day-head{padding:11px 12px;gap:8px;}
  .day-num{font-size:20px;}
  .day-name-inp{font-size:12px;padding:6px 9px;}
  .day-del{width:28px;height:28px;font-size:13px;}

  /* MUSCLE SECTIONS */
  .muscle-sections{padding:10px 12px 14px;}

  /* EX TABLE - stack on mobile */
  .ex-thead{display:none;}
  .ex-row{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    padding:10px 12px;
    align-items:center;
    position:relative;
  }
  .ex-num{
    font-size:14px;
    min-width:22px;
  }
  .ex-inp{
    flex:1;
    min-width:120px;
    font-size:13px;
    border-bottom:1px dashed var(--border);
    padding-bottom:3px;
  }
  .ex-mini{
    width:58px;
    font-size:12px;
    padding:4px 3px;
  }
  .ex-del{
    margin-right:auto;
  }

  /* ADD EX BUTTON */
  .btn-add-ex{font-size:12px;padding:10px;}

  /* ADD DAY */
  .btn-add-day{padding:16px;font-size:13px;border-radius:12px;}

  /* MUSCLE BLOCK */
  .muscle-block-head{padding:8px 12px;}
  .muscle-select{font-size:13px;}

  /* GATE */
  .gate-box{padding:32px 22px;margin:0 12px;border-radius:18px;}
  .gate-icon{font-size:38px;}
  .gate-title{font-size:18px;}
  .gate-inp{font-size:18px;padding:11px 16px;}

  /* PREVIEW MODAL */
  #overlay{padding:0;}
  .modal{
    border-radius:0;
    max-width:100%;
    width:100%;
    margin:0;
    min-height:100vh;
  }
  .modal-close{top:10px;left:10px;}
  .modal-print{top:10px;right:10px;padding:6px 12px;font-size:11px;}

  /* PREVIEW COVER */
  .pv-cover{padding:60px 20px 24px;}
  .pv-title{font-size:28px;letter-spacing:2px;}
  .pv-tags{gap:5px;}
  .pv-tag{padding:4px 10px;font-size:11px;}

  /* PREVIEW BODY */
  .pv-body{padding:14px 12px;}
  .pv-day{margin-bottom:14px;border-radius:10px;}
  .pv-day-head{padding:10px 12px;gap:8px;}
  .pv-day-num{font-size:18px;}
  .pv-day-name{font-size:13px;}
  .pv-day-type{font-size:9px;}

  /* PREVIEW TABLE - scroll horizontal */
  .pv-table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .pv-table th{padding:7px 8px;font-size:8px;white-space:nowrap;}
  .pv-table td{padding:8px 8px;font-size:12px;white-space:nowrap;}
  .pv-table td.sets{font-size:17px;}
  .pv-table td.reps{font-size:17px;}
  .pv-img{max-width:130px;}

  /* FOOTER */
  .pv-footer{font-size:9px;letter-spacing:2px;padding:10px;}
}

/* Extra small screens */
@media(max-width:380px){
  .nav-btn:not(.gold){display:none;}
  .ex-mini{width:48px;font-size:11px;}
  .pv-title{font-size:22px;}
}

@media print {
  @page {
    margin: 10mm 12mm;
    size: A4;
    /* إخفاء التاريخ والوقت والعنوان من المتصفح */
    margin-top: 0;
    margin-bottom: 0;
  }

  @page :first { margin-top: 0; }

  /* إخفاء header/footer المتصفح */
  html {
    margin: 0 !important;
  }

  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; color-adjust: exact !important; }

  html, body { background: #fff !important; margin: 0 !important; padding: 0 !important; }

  nav, #gate, .sidebar, .editor, .btn-add-day, .modal-close, .modal-print { display: none !important; }

  #overlay {
    display: block !important;
    position: absolute !important;
    top: 0 !important; left: 0 !important; right: 0 !important;
    background: transparent !important;
    padding: 0 !important; margin: 0 !important;
    overflow: visible !important;
    width: 100% !important; height: auto !important;
    backdrop-filter: none !important;
  }

  .modal {
    border-radius: 0 !important;
    max-width: 100% !important; width: 100% !important;
    box-shadow: none !important;
    margin: 0 !important; padding: 0 !important;
    position: static !important;
    overflow: visible !important;
    max-height: none !important; height: auto !important;
  }

  .pv-cover {
    background: var(--primary) !important;
    -webkit-print-color-adjust: exact !important;
    page-break-after: always;
  }

  .pv-body { padding: 10mm 12mm !important; overflow: visible !important; max-height: none !important; height: auto !important; }

  .pv-day { page-break-inside: avoid; border: 1.5px solid var(--border) !important; }
  .pv-day-head { background: var(--primary) !important; -webkit-print-color-adjust: exact !important; }
  .pv-muscle-title { background: #f0eef8 !important; -webkit-print-color-adjust: exact !important; }
  .pv-table th { background: #fafafa !important; -webkit-print-color-adjust: exact !important; }
  .pv-table tbody tr:nth-child(even) td { background: #fdfcfa !important; -webkit-print-color-adjust: exact !important; }
  .pv-notes { background: #fffdf5 !important; -webkit-print-color-adjust: exact !important; }
  .pv-tag { background: rgba(255,255,255,.1) !important; -webkit-print-color-adjust: exact !important; }
}
</style>
</head>
<body>

<!-- GATE -->
<div id="gate">
  <div class="gate-box">
    <div class="gate-logo">COACH ANIS</div>
    <div class="gate-icon">🔐</div>
    <div class="gate-title">منشئ البرامج التدريبية</div>
    <div class="gate-sub">أدخل كود الدخول</div>
    <input class="gate-inp" id="gateInp" type="password" placeholder="• • • • • •" autocomplete="off">
    <div class="gate-err" id="gateErr"></div>
    <button class="gate-btn" onclick="gateCheck()">دخول ←</button>
  </div>
</div>

<!-- APP -->
<div id="app">
<nav>
  <div class="nav-brand">COACH ANIS</div>
  <div class="nav-actions">
    <button class="nav-btn" onclick="importTrigger()">📂 استيراد</button>
    <button class="nav-btn" onclick="exportJSON()">💾 حفظ</button>
    <button class="nav-btn gold" onclick="openPreview()">👁 معاينة</button>
  </div>
</nav>
<input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(this)">

<div class="layout">
  <aside class="sidebar">
    <div class="sb-title">⚙️ إعدادات البرنامج</div>
    <div class="stats-row">
      <div class="stat-box"><div class="stat-val" id="sD">0</div><div class="stat-lbl">أيام</div></div>
      <div class="stat-box"><div class="stat-val" id="sE">0</div><div class="stat-lbl">تمرين</div></div>
      <div class="stat-box"><div class="stat-val" id="sS">0</div><div class="stat-lbl">ست</div></div>
    </div>
    <div class="field">
      <label>📝 اسم البرنامج</label>
      <input id="progName" placeholder="مثال: برنامج القوة 12 أسبوع">
    </div>
    <div class="field">
      <label>👤 اسم العميل</label>
      <input id="clientName" placeholder="اسم العميل">
    </div>
    <div class="field">
      <label>📋 ملاحظات عامة</label>
      <textarea id="progNotes" placeholder="أي ملاحظات أو تعليمات للعميل..."></textarea>
    </div>
    <div class="field">
      <label>🖼️ الشعار (اختياري)</label>
      <input type="file" id="logoInput" accept="image/*" style="display:none" onchange="handleLogo(this)">
      <div class="logo-zone" id="logoZone" onclick="document.getElementById('logoInput').click()">＋ رفع الشعار</div>
      <img class="logo-preview" id="logoPreview" style="display:none">
      <span class="logo-remove" id="logoRemove" style="display:none" onclick="removeLogo()">✕ حذف الشعار</span>
    </div>
    <button class="btn-preview" onclick="openPreview()">👁 معاينة البرنامج</button>
    <div class="btn-row">
      <button class="btn-sm" onclick="exportJSON()">💾 حفظ JSON</button>
      <button class="btn-sm" onclick="importTrigger()">📂 استيراد</button>
    </div>
  </aside>

  <main class="editor">
    <div class="editor-title">📋 محرر الأيام التدريبية</div>
    <div id="editor"></div>
    <button class="btn-add-day" onclick="addDay()">＋ إضافة يوم تدريبي</button>
  </main>
</div>

<!-- PREVIEW MODAL -->
<div id="overlay" onclick="closePreview(event)">
  <div class="modal">
    <button class="modal-close" onclick="closePreview({target:document.getElementById('overlay')})">✕</button>
    <button class="modal-print" onclick="printClean()">🖨 طباعة / PDF</button>
    <div id="pvContent"></div>
  </div>
</div>
</div>

<script>
let days=[], dayCounter=0, logoData=null;

function printClean(){
  // فتح نافذة طباعة بدون header/footer
  const content = document.getElementById('pvContent').innerHTML;
  const styles = Array.from(document.querySelectorAll('style')).map(s=>s.innerHTML).join('');
  const win = window.open('','_blank','width=900,height=700');
  win.document.write(`<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
${styles}
@page { margin: 10mm 12mm; size: A4; }
* { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
body { margin: 0; padding: 0; background: #fff; font-family: 'Cairo', sans-serif; }
</style>
</head>
<body>
${content}
<script>window.onload=function(){window.print();window.onafterprint=function(){window.close();};};<\/script>
</body></html>`);
  win.document.close();
}

const MUSCLES=['صدر','ظهر','أكتاف','بايسبس','ترايسبس','أرجل','كوادز','هامسترينج','غلوتس','كور','ساق','Chest','Back','Shoulders','Biceps','Triceps','Legs','Quads','Hamstrings','Glutes','Core','Calves'];

function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function getDayById(id){return days.find(d=>d.id===id);}
function getMB(dayId,mbId){return getDayById(dayId)?.muscleBlocks.find(m=>m.id===mbId);}
function getEx(dayId,mbId,exId){return getMB(dayId,mbId)?.exercises.find(e=>e.id===exId);}

// GATE
document.getElementById('gateInp').addEventListener('keydown',e=>{
  if(e.key==='Enter')gateCheck();
  document.getElementById('gateErr').textContent='';
  document.getElementById('gateInp').classList.remove('err');
});
function gateCheck(){
  const val=document.getElementById('gateInp').value.trim();
  const err=document.getElementById('gateErr');
  if(!val){err.textContent='⚠️ أدخل الكود';document.getElementById('gateInp').classList.add('err');return;}
  if(val==='anis2006'){
    const gate=document.getElementById('gate');
    gate.classList.add('hide');
    setTimeout(()=>{gate.style.display='none';document.getElementById('app').classList.add('show');addDay();},650);
  } else {
    err.textContent='✗ الكود غير صحيح';
    document.getElementById('gateInp').classList.add('err');
    document.getElementById('gateInp').value='';
    setTimeout(()=>{document.getElementById('gateInp').classList.remove('err');err.textContent='';},2500);
  }
}

// LOGO
function handleLogo(input){
  const file=input.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=e=>{
    logoData=e.target.result;
    document.getElementById('logoZone').style.display='none';
    document.getElementById('logoPreview').src=logoData;
    document.getElementById('logoPreview').style.display='block';
    document.getElementById('logoRemove').style.display='block';
  };r.readAsDataURL(file);
}
function removeLogo(){
  logoData=null;
  document.getElementById('logoZone').style.display='';
  document.getElementById('logoPreview').style.display='none';
  document.getElementById('logoRemove').style.display='none';
  document.getElementById('logoInput').value='';
}

// STATS
function updateStats(){
  let totalEx=0,totalSets=0;
  days.forEach(d=>d.muscleBlocks.forEach(mb=>{
    totalEx+=mb.exercises.length;
    mb.exercises.forEach(ex=>{totalSets+=(parseInt(ex.sets)||0);});
  }));
  document.getElementById('sD').textContent=days.length;
  document.getElementById('sE').textContent=totalEx;
  document.getElementById('sS').textContent=totalSets;
}

// DAY
function addDay(data){
  dayCounter++;
  const id='day_'+Date.now();
  const day=data||{id,num:dayCounter,name:'',type:'',muscleBlocks:[]};
  if(!data)days.push(day);
  renderDay(day.id);
  updateStats();
}

function renderDay(id){
  const day=getDayById(id);if(!day)return;
  const editor=document.getElementById('editor');
  let el=document.getElementById('dc_'+id);
  if(!el){el=document.createElement('div');el.id='dc_'+id;editor.appendChild(el);}

  el.innerHTML=`
  <div class="day-card">
    <div class="day-head">
      <div class="day-num">D${day.num}</div>
      <input class="day-name-inp" placeholder="اسم اليوم (مثال: Push Day)"
        value="${escH(day.name)}" oninput="getDayById('${id}').name=this.value">
      <button class="day-del" onclick="deleteDay('${id}')">🗑</button>
    </div>

    <div class="muscle-sections" id="ms_${id}">
      ${day.muscleBlocks.map(mb=>renderMB(id,mb)).join('')}
      <button class="btn-add-muscle" onclick="addMB('${id}')">💪 إضافة قسم عضلة</button>
    </div>
  </div>`;
}

// MUSCLE BLOCK
function renderMB(dayId,mb){
  const opts=MUSCLES.map(m=>`<option value="${m}" ${mb.muscle===m?'selected':''}>${m}</option>`).join('');
  const exHtml=mb.exercises.map((ex,i)=>renderExRow(dayId,mb.id,ex,i)).join('');
  return `
  <div class="muscle-block" id="mb_${mb.id}">
    <div class="muscle-block-head">
      <span style="font-size:14px">💪</span>
      <select class="muscle-select" onchange="getMB('${dayId}','${mb.id}').muscle=this.value">
        <option value="">— اختر العضلة —</option>${opts}
      </select>
      <button class="muscle-block-del" onclick="deleteMB('${dayId}','${mb.id}')">🗑</button>
    </div>
    <div class="ex-thead">
      <div class="ex-th">#</div>
      <div class="ex-th name">التمرين</div>
      <div class="ex-th">SETS</div>
      <div class="ex-th">REPS</div>
      <div class="ex-th">REST</div>
      <div class="ex-th"></div>
    </div>
    <div id="exlist_${mb.id}">${exHtml}</div>
    <button class="btn-add-ex" onclick="addEx('${dayId}','${mb.id}')">＋ إضافة تمرين</button>
  </div>`;
}

function addMB(dayId){
  const day=getDayById(dayId);if(!day)return;
  const mb={id:'mb_'+Date.now(),muscle:'',exercises:[]};
  day.muscleBlocks.push(mb);
  renderDay(dayId);updateStats();
}
function deleteMB(dayId,mbId){
  const day=getDayById(dayId);if(!day)return;
  day.muscleBlocks=day.muscleBlocks.filter(m=>m.id!==mbId);
  renderDay(dayId);updateStats();
}
function deleteDay(id){
  if(!confirm('حذف هذا اليوم؟'))return;
  days=days.filter(d=>d.id!==id);
  document.getElementById('dc_'+id)?.remove();
  updateStats();
}

// EXERCISE
function renderExRow(dayId,mbId,ex,i){
  const imgHtml=ex.image
    ?`<img class="ex-img-preview" src="${ex.image}"><span class="ex-img-rem" onclick="removeExImg('${dayId}','${mbId}','${ex.id}')">✕ حذف الصورة</span>`
    :`<button class="ex-img-btn" onclick="document.getElementById('imgf_${ex.id}').click()">📷 إضافة صورة للتمرين</button>`;
  return `
  <div id="ex_${ex.id}">
    <div class="ex-row">
      <div class="ex-num">${i+1}</div>
      <input class="ex-inp" placeholder="اسم التمرين..." value="${escH(ex.name)}"
        oninput="getEx('${dayId}','${mbId}','${ex.id}').name=this.value;updateStats()">
      <input class="ex-mini" type="number" min="1" max="30" placeholder="Sets" value="${escH(ex.sets||'')}"
        oninput="getEx('${dayId}','${mbId}','${ex.id}').sets=this.value;updateStats()">
      <input class="ex-mini" placeholder="Reps" value="${escH(ex.reps||'')}"
        oninput="getEx('${dayId}','${mbId}','${ex.id}').reps=this.value">
      <input class="ex-mini" placeholder="60s" value="${escH(ex.rest||'')}"
        oninput="getEx('${dayId}','${mbId}','${ex.id}').rest=this.value">
      <button class="ex-del" onclick="deleteEx('${dayId}','${mbId}','${ex.id}')">🗑</button>
    </div>
    <div class="ex-extras">
      <input class="ex-notes-inp" placeholder="ملاحظة (اختياري)..." value="${escH(ex.notes||'')}"
        oninput="getEx('${dayId}','${mbId}','${ex.id}').notes=this.value">
      <div id="imgzone_${ex.id}">${imgHtml}</div>
    </div>
    <input type="file" id="imgf_${ex.id}" accept="image/*" style="display:none"
      onchange="handleExImg('${dayId}','${mbId}','${ex.id}',this)">
  </div>`;
}

function addEx(dayId,mbId){
  const mb=getMB(dayId,mbId);if(!mb)return;
  const ex={id:'ex_'+Date.now(),name:'',sets:'',reps:'',rest:'',notes:'',image:''};
  mb.exercises.push(ex);
  const list=document.getElementById('exlist_'+mbId);
  const tmp=document.createElement('div');
  tmp.innerHTML=renderExRow(dayId,mbId,ex,mb.exercises.length-1);
  list.appendChild(tmp.firstElementChild);
  updateStats();
}

function deleteEx(dayId,mbId,exId){
  const mb=getMB(dayId,mbId);if(!mb)return;
  mb.exercises=mb.exercises.filter(e=>e.id!==exId);
  document.getElementById('ex_'+exId)?.remove();
  document.getElementById('exlist_'+mbId)?.querySelectorAll('.ex-num').forEach((el,i)=>el.textContent=i+1);
  updateStats();
}

function handleExImg(dayId,mbId,exId,input){
  const file=input.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=e=>{
    getEx(dayId,mbId,exId).image=e.target.result;
    const zone=document.getElementById('imgzone_'+exId);
    if(zone)zone.innerHTML=`<img class="ex-img-preview" src="${e.target.result}"><span class="ex-img-rem" onclick="removeExImg('${dayId}','${mbId}','${exId}')">✕ حذف الصورة</span>`;
  };r.readAsDataURL(file);
}
function removeExImg(dayId,mbId,exId){
  getEx(dayId,mbId,exId).image='';
  const zone=document.getElementById('imgzone_'+exId);
  if(zone)zone.innerHTML=`<button class="ex-img-btn" onclick="document.getElementById('imgf_${exId}').click()">📷 إضافة صورة للتمرين</button>`;
}

// EXPORT / IMPORT
function exportJSON(){
  const data={meta:{name:document.getElementById('progName').value,client:document.getElementById('clientName').value,notes:document.getElementById('progNotes').value,logo:logoData},days};
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));
  a.download=(data.meta.client||data.meta.name||'program').replace(/\s+/g,'_')+'_program.json';
  a.click();
}
function importTrigger(){document.getElementById('importFile').click();}
function importJSON(input){
  const file=input.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(data.meta){
        document.getElementById('progName').value=data.meta.name||'';
        document.getElementById('clientName').value=data.meta.client||'';
        document.getElementById('progNotes').value=data.meta.notes||'';
        if(data.meta.logo){
          logoData=data.meta.logo;
          document.getElementById('logoZone').style.display='none';
          document.getElementById('logoPreview').src=logoData;
          document.getElementById('logoPreview').style.display='block';
          document.getElementById('logoRemove').style.display='block';
        }
      }
      days=data.days||[];
      dayCounter=days.length?Math.max(...days.map(d=>d.num)):0;
      document.getElementById('editor').innerHTML='';
      days.forEach(d=>renderDay(d.id));
      updateStats();
    }catch(err){alert('❌ ملف غير صالح');}
  };r.readAsText(file);input.value='';
}

// PREVIEW
function openPreview(){
  const name=document.getElementById('progName').value||'البرنامج التدريبي';
  const client=document.getElementById('clientName').value;
  const notes=document.getElementById('progNotes').value;
  const totalDays=days.filter(d=>d.muscleBlocks.some(mb=>mb.exercises.length>0)).length;

  const logoHtml=logoData?`<img class="pv-logo" src="${logoData}">`:`<div class="pv-brand">COACH ANIS</div>`;

  let html=`<div class="pv-cover">${logoHtml}
    <div class="pv-title">${escH(name)}</div>
    ${client?`<div class="pv-client">معد لـ: ${escH(client)}</div>`:''}
    <div class="pv-tags"><span class="pv-tag">🏋️ ${totalDays} يوم تدريبي</span></div>
    <div class="pv-line"></div>
  </div><div class="pv-body">`;

  if(notes)html+=`<div style="background:#fffdf5;border-right:3px solid #e8b84b;border-radius:8px;padding:11px 15px;margin-bottom:18px;font-size:13px;color:#666"><strong style="color:#e8b84b">📋 ملاحظات:</strong> ${escH(notes)}</div>`;

  days.forEach(day=>{
    if(!day.muscleBlocks.some(mb=>mb.exercises.length>0))return;
    html+=`<div class="pv-day">
      <div class="pv-day-head">
        <div class="pv-day-num">D${day.num}</div>
        <div class="pv-day-name">${escH(day.name||'يوم '+day.num)}</div>
        ${day.type?`<div class="pv-day-type">${escH(day.type)}</div>`:''}
      </div>`;
    day.muscleBlocks.forEach(mb=>{
      if(!mb.exercises.length)return;
      html+=`${mb.muscle?`<div class="pv-muscle-title">${escH(mb.muscle)}</div>`:''}
      <table class="pv-table">
        <thead><tr>
          <th style="width:34px">#</th>
          <th class="name">التمرين</th>
          <th style="width:58px">SETS</th>
          <th style="width:68px">REPS</th>
          <th style="width:60px">REST</th>
        </tr></thead><tbody>
        ${mb.exercises.map((ex,i)=>`
          <tr>
            <td>${i+1}</td>
            <td class="name">${escH(ex.name||'—')}${ex.image?`<br><img class="pv-img" src="${ex.image}">`:''}</td>
            <td class="sets">${escH(ex.sets||'—')}</td>
            <td class="reps">${escH(ex.reps||'—')}</td>
            <td class="rest">${escH(ex.rest||'—')}</td>
          </tr>
          ${ex.notes?`<tr><td colspan="5"><div class="pv-notes">💬 ${escH(ex.notes)}</div></td></tr>`:''}
        `).join('')}
        </tbody></table>`;
    });
    html+=`</div>`;
  });

  if(!days.some(d=>d.muscleBlocks.some(mb=>mb.exercises.length>0)))
    html+=`<div style="text-align:center;padding:40px;color:#aaa">أضف تمارين أولاً</div>`;

  html+=`</div><div class="pv-footer">PROGRAMMED BY COACH ANIS · @coach__anis</div>`;
  document.getElementById('pvContent').innerHTML=html;
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function closePreview(e){
  if(e&&e.target!==document.getElementById('overlay')&&!e.target.closest?.('.modal-close'))return;
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow='';
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closePreview({target:document.getElementById('overlay')});});
</script>
</body>
</html>
